name: Sincronización Menú QR

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "tailwind.config.js"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      # ==========================================
      # BLOQUE 1: PYTHON (Solo si viene de Sheets)
      # ==========================================
      - name: Configurar Python
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Instalar dependencias Python
        if: github.event_name == 'workflow_dispatch'
        run: pip install -r scripts/requirements.txt

      - name: Configurar FFmpeg
        if: github.event_name == 'workflow_dispatch'
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: "6.1.0"

      - name: Generar credenciales de Google
        if: github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          mkdir -p scripts
          echo "$GOOGLE_CREDENTIALS" > scripts/credentials.json

      - name: Ejecutar Sincronizar con Google Sheets
        if: github.event_name == 'workflow_dispatch'
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scripts/sync.py

      # ==========================================
      # BLOQUE 2: TAILWIND (Solo si el Dev hace Push)
      # ==========================================
      - name: Configurar Node.js
        if: github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar NPM y Compilar Tailwind
        if: github.event_name == 'push'
        run: |
          npm install
          npm run build

      # ==========================================
      # BLOQUE 3: COMMIT Y PUSH SEGÚN ORIGEN
      # ==========================================
      - name: Commit y Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Si viene de Sheets: solo nos importan los datos e imágenes
            git add --all docs/ backups/ scripts/image_hashes.json
            git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de Menú $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Notificar Error a Telegram
        if: failure()
        run: |
          ERROR_MSG="Error en la acción (GitHub Actions). Revisa los logs."
          [ -f error_telegram.txt ] && ERROR_MSG=$(cat error_telegram.txt)
          jq -n --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" --arg text "❌ *Error Actualizando Web Menú*\n\`\`\`\n$ERROR_MSG\n\`\`\`" '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}' > payload.json
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -H "Content-Type: application/json" -d @payload.json
