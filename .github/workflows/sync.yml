name: Sincronización Menú QR

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "tailwind.config.js"
      - ".github/workflows/**"

# Permisos requeridos para desplegar en GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6

      # ==========================================
      # BLOQUE 1: PYTHON (Solo en manual)
      # ==========================================
      - name: Configurar Python
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Instalar dependencias Python
        if: github.event_name == 'workflow_dispatch'
        run: pip install -r scripts/requirements.txt

      - name: Configurar FFmpeg
        if: github.event_name == 'workflow_dispatch'
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: "6.1.0"

      - name: Ejecutar Sincronizar con Google Sheets
        if: github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          mkdir -p scripts
          echo "$GOOGLE_CREDENTIALS" > scripts/credentials.json
          python scripts/sync.py

      - name: Commit de datos de Sheets
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add backups/ scripts/image_hashes.json docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de Menú $(date +'%Y-%m-%d %H:%M')"
          git push

      # ==========================================
      # BLOQUE 2: COMPILAR TAILWIND (Solo en push)
      # ==========================================
      - name: Configurar Node.js a v24
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Actualizado para evitar la deprecación

      - name: Instalar NPM y Compilar Tailwind
        # run: |
        #   npm install
        #   npm run build
        run: exit 1

      # ==========================================
      # BLOQUE 3: DESPLIEGUE EN PAGES
      # ==========================================
      - name: Subir artefacto a Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Desplegar en GitHub Pages
        uses: actions/deploy-pages@v4

      # ==========================================
      # BLOQUE 4: NOTIFICACIONES
      # ==========================================
      - name: Notificar Error a Telegram
        if: failure()
        run: |
          ERROR_MSG="Error en la acción (GitHub Actions). Revisa los logs."
          [ -f error_telegram.txt ] && ERROR_MSG=$(cat error_telegram.txt)
          jq -n --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" --arg text "❌ *Error Actualizando Web Menú*\n\`\`\`\n$ERROR_MSG\n\`\`\`" '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}' > payload.json
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -H "Content-Type: application/json" -d @payload.json
